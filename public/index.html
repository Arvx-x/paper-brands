<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Paper Brands — Playground</title>
<style>
:root{--bg:#f6f6f4;--white:#ffffff;--border:#1a1a1a;--border-light:#e2e2df;--ink:#1a1a1a;--mut:#6b7280;--accent:#f9427d;--accent-bg:#fff0f4;--good:#16a34a;--warn:#d97706;--blue:#2563eb;--tag-bg:#f0f0ec}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:14px;line-height:1.5;display:flex;flex-direction:column;min-height:100vh}

/* ── TOP BAR ── */
.topbar{display:flex;align-items:center;gap:12px;padding:12px 24px;background:var(--white);border-bottom:1.5px solid var(--border);flex-wrap:wrap}
.brand{font-weight:800;font-size:16px;letter-spacing:-.3px;margin-right:4px;white-space:nowrap}
.cat-input{flex:1;min-width:220px;max-width:360px;border:1.5px solid var(--border);border-radius:6px;padding:8px 12px;font-size:13px;background:var(--white);outline:none}
.cat-input:focus{border-color:var(--accent)}
.cohort-wrap{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--mut);white-space:nowrap}
.cohort-wrap input[type=range]{width:88px;accent-color:var(--accent);cursor:pointer}
.cohort-num{font-weight:700;color:var(--ink);min-width:24px}
.run-btn{background:var(--ink);color:#fff;border:1.5px solid var(--ink);border-radius:6px;padding:8px 20px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background .15s}
.run-btn:hover{background:#333}
.status-pill{margin-left:auto;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;border:1.5px solid var(--border-light);border-radius:4px;padding:4px 10px;background:var(--tag-bg);white-space:nowrap}
.status-pill.running{border-color:var(--warn);color:var(--warn);background:#fffbeb}
.status-pill.complete{border-color:var(--good);color:var(--good);background:#f0fdf4}
.status-pill.error{border-color:#dc2626;color:#dc2626;background:#fef2f2}

/* ── TABS ── */
.tabs{display:flex;gap:0;padding:0 24px;background:var(--white);border-bottom:1.5px solid var(--border)}
.tab{padding:12px 20px;font-size:13px;font-weight:600;color:var(--mut);cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;transition:color .15s}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--ink);border-bottom-color:var(--ink)}

/* ── MAIN ── */
main{padding:24px;width:100%;flex:1;display:flex;flex-direction:column}

/* ── WINNER BANNER ── */
.winner-banner{background:var(--white);border:1.5px solid var(--border);border-radius:8px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:16px;width:100%}
.winner-badge{background:var(--ink);color:#fff;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;border-radius:4px;padding:3px 8px;white-space:nowrap}
.winner-name{font-size:18px;font-weight:800;letter-spacing:-.3px}
.winner-stats{display:flex;gap:16px;margin-left:auto;flex-wrap:wrap}
.wstat{text-align:right}
.wstat .val{font-size:22px;font-weight:800;line-height:1}
.wstat .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);margin-top:2px}
.wstat.good .val{color:var(--good)}

/* ── ARENA LAYOUT ── */
.arena{display:flex;flex-direction:column;gap:16px;width:100%;flex:1}
.card{background:var(--white);border:1.5px solid var(--border);border-radius:8px;padding:20px;width:100%}
.card.grow{flex:1;display:flex;flex-direction:column}
.card.grow .feed-scroll{flex:1;max-height:none}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--mut);margin-bottom:14px}

/* ── TALLY BARS ── */
.barrow{margin-bottom:10px}
.barrow .bh{display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:4px}
.track{background:var(--tag-bg);border:1px solid var(--border-light);border-radius:3px;height:12px;overflow:hidden}
.fill{background:var(--ink);height:12px;border-radius:2px;transition:width .35s ease}
.tally-foot{font-size:11px;color:var(--mut);margin-top:12px;border-top:1px solid var(--border-light);padding-top:10px}

/* ── DECISION FEED ── */
.feed-scroll{max-height:60vh;overflow-y:auto}
@media(max-width:600px){.pages-grid{grid-template-columns:1fr}}
.fitem{border:1.5px solid var(--border-light);border-left:3px solid var(--good);border-radius:6px;padding:12px 14px;margin-bottom:8px;font-size:13px;cursor:pointer;transition:border-color .15s;background:var(--white)}
.fitem:hover{border-color:var(--border)}
.fitem.ab{border-left-color:var(--border-light)}
.fitem .ftop{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.fitem .pid{font-weight:700;font-size:11px}
.fitem .seg{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--mut);background:var(--tag-bg);border:1px solid var(--border-light);border-radius:3px;padding:1px 5px}
.fitem .opt{font-weight:700;color:var(--blue);font-size:11px}
.fitem .conv{font-size:10px;color:var(--mut);margin-left:auto}
.fitem .reason{color:var(--mut);font-size:11px;line-height:1.4}
.fitem .obj{color:var(--warn);font-size:10px;margin-top:2px}

/* ── CREATIVE TAB ── */
.brow{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--border-light)}
.brow:last-child{border-bottom:0}
.brow .bname{font-weight:700;width:160px;flex-shrink:0}
.brow .bmoat{font-size:11px;color:var(--mut);margin-top:2px}
.thumb-wrap{display:flex;gap:8px}
.thumb{width:60px;height:60px;border-radius:6px;border:1.5px solid var(--border-light);object-fit:cover;background:var(--tag-bg)}
.thumb.ph{display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--mut);flex-direction:column;gap:2px}

/* ── PAGES TAB ── */
.pages-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;width:100%}
.pcard{background:var(--white);border:1.5px solid var(--border);border-radius:8px;overflow:hidden}
.pcard .pframe{height:220px;overflow:hidden;border-bottom:1.5px solid var(--border);background:var(--tag-bg);position:relative}
.pcard iframe{width:100%;height:100%;border:0}
.pcard .pbody{padding:14px}
.pcard .pname{font-weight:800;font-size:15px;letter-spacing:-.2px;margin-bottom:6px}
.pcard .pmeta{display:flex;gap:10px;margin-bottom:12px}
.pcard .ptag{font-size:11px;font-weight:600;background:var(--tag-bg);border:1px solid var(--border-light);border-radius:3px;padding:2px 7px}
.pcard .ptag.win{background:var(--accent-bg);color:var(--accent);border-color:var(--accent)}
.pcard a{display:block;text-align:center;background:var(--ink);color:#fff;text-decoration:none;border-radius:6px;padding:9px;font-size:13px;font-weight:700}
.pcard a:hover{background:#333}

/* ── MODAL (conversation) ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border:2px solid var(--border);border-radius:10px;width:540px;max-width:94vw;max-height:86vh;display:flex;flex-direction:column}
.modal-head{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1.5px solid var(--border-light)}
.modal-head .mname{font-weight:800;font-size:15px}
.modal-head .mseg{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);background:var(--tag-bg);border:1px solid var(--border-light);border-radius:3px;padding:2px 7px}
.modal-head .mclose{margin-left:auto;cursor:pointer;font-size:18px;color:var(--mut);line-height:1;border:0;background:0}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.detail-row{display:flex;gap:8px;margin-bottom:8px;font-size:13px}
.detail-row .dk{width:90px;flex-shrink:0;color:var(--mut);font-size:12px;text-transform:uppercase;letter-spacing:.06em;font-weight:600;padding-top:1px}
.detail-row .dv{color:var(--ink);font-weight:500}
.detail-row .dv.pick{color:var(--blue);font-weight:700}
.detail-row .dv.obj{color:var(--warn)}
.conf-bar{height:6px;background:var(--tag-bg);border:1px solid var(--border-light);border-radius:3px;margin-top:6px;overflow:hidden}
.conf-fill{height:6px;background:var(--good);border-radius:2px}

/* ── HARVEST LIST ── */
.hlist{display:flex;flex-direction:column;gap:0}
.hrow{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--border-light);font-size:13px}
.hrow:last-child{border-bottom:0}
.hrow.done .hstep{color:var(--good);font-size:15px;width:20px;flex-shrink:0}
.hrow.active .hstep{color:var(--accent);font-size:15px;width:20px;flex-shrink:0}
.hinfo{font-weight:600;min-width:180px}
.hmeta{color:var(--mut);font-size:12px;flex:1}

/* ── SPIN ANIMATION ── */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin 1s linear infinite}

/* ── ERROR ── */
.err-banner{background:#fef2f2;border:1.5px solid #dc2626;border-radius:8px;padding:14px 18px;color:#991b1b;margin-bottom:16px;font-weight:600}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:80px 20px;color:var(--mut);width:100%}
.empty .big{font-size:42px;margin-bottom:12px}
.empty p{font-size:14px;max-width:400px;margin:0 auto}
</style></head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <span class="brand">Paper Brands</span>
  <input id="cat" class="cat-input" placeholder="category — e.g. lip-balm-india" value="lip-balm-india">
  <div class="cohort-wrap">
    <span>Cohort</span>
    <input id="cohort" type="range" min="20" max="120" step="20" value="80">
    <span id="cohort-val" class="cohort-num">80</span>
  </div>
  <button id="run" class="run-btn">▶ Run</button>
  <span class="status-pill" id="status">Idle</span>
</div>

<!-- TABS -->
<div class="tabs" id="tabs">
  <span class="tab" data-tab="harvest">Harvest &amp; Intel</span>
  <span class="tab" data-tab="arena">Arena</span>
  <span class="tab" data-tab="creative">Creative</span>
  <span class="tab" data-tab="pages">Pages</span>
</div>

<main id="main"></main>

<!-- CONVERSATION MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-head">
      <span class="mname" id="m-name"></span>
      <span class="mseg" id="m-seg"></span>
      <button class="mclose" id="mclose">✕</button>
    </div>
    <div class="modal-body" id="m-body"></div>
  </div>
</div>

<script type="module">
import { reduce, initialState } from "/viewstate.js";
let state = initialState();
let modalData = null;
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? "").replace(/[&<>"]/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
const pct = (v) => v != null ? (v * 100).toFixed(0) + "%" : "—";

// ── STATUS PILL ──
function statusClass(s) { return s === "running" ? "running" : s === "complete" ? "complete" : s === "error" ? "error" : ""; }

// Which stage is actively running right now?
function activeStage(s) {
  const order = ["harvest","intel","council","cohort","arena","scoring","finalists","creative","pages"];
  return order.find((st) => s.stages[st] === "active") ?? null;
}

function tabLabel(tab, s) {
  const stageMap = { harvest: ["harvest","intel"], arena: ["council","cohort","arena","scoring"], creative: ["finalists","creative"], pages: ["pages"] };
  const running = s.status === "running" && (stageMap[tab] ?? []).some((st) => s.stages[st] === "active");
  const labels = { harvest: "Harvest &amp; Intel", arena: "Arena", creative: "Creative", pages: "Pages" };
  return running ? `<span class="spin">⟳</span> ${labels[tab]}` : labels[tab];
}

function render(s) {
  const pill = $("status");
  pill.textContent = s.status === "running" ? "Running" + (s.category ? " · " + s.category : "") : s.status.charAt(0).toUpperCase() + s.status.slice(1);
  pill.className = "status-pill " + statusClass(s.status);
  for (const t of document.querySelectorAll(".tab")) {
    t.classList.toggle("active", t.dataset.tab === s.activeTab);
    t.innerHTML = tabLabel(t.dataset.tab, s);
  }
  const m = $("main");
  let html = "";
  if (s.error) html += `<div class="err-banner">⚠ Run error: ${esc(s.error)}</div>`;
  if (s.activeTab === "harvest") html += harvestHtml(s);
  else if (s.activeTab === "arena") html += arenaHtml(s);
  else if (s.activeTab === "creative") html += creativeHtml(s);
  else html += pagesHtml(s);
  m.innerHTML = html;
  // re-attach feed click listeners after re-render
  for (const el of document.querySelectorAll(".fitem[data-idx]")) {
    el.onclick = () => { const f = s.feed[Number(el.dataset.idx)]; if (f) openModal(f); };
  }
}

// ── HARVEST + INTEL ──
function harvestHtml(s) {
  const h = s.harvest;
  const intel = s.intel;
  const hStage = s.stages["harvest"];
  const iStage = s.stages["intel"];
  const hRunning = hStage === "active";
  const iRunning = iStage === "active";
  const hDone = hStage === "done";
  const iDone = iStage === "done";

  // Lens rows
  const totalLenses = 8; // expected
  const lensRows = h.lenses.map((l) =>
    `<div class="hrow done"><div class="hstep">✓</div><div class="hinfo"><b>${esc(l.id)}</b></div><div class="hmeta">${l.findings} findings · ${l.citations} citations</div></div>`
  ).join("");
  const pendingLenses = !hDone ? `<div class="hrow active"><div class="hstep spin">⟳</div><div class="hinfo">Researching lenses…</div><div class="hmeta">${h.lenses.length}/${totalLenses}</div></div>` : "";

  // Sources row
  const sourcesRow = h.sourcesFetched != null
    ? `<div class="hrow done"><div class="hstep">✓</div><div class="hinfo"><b>Sources fetched</b></div><div class="hmeta">${h.sourcesFetched}/${h.sourcesTotal} · ${h.domains} domains (${h.independent} independent)</div></div>`
    : (hRunning && h.lenses.length >= totalLenses ? `<div class="hrow active"><div class="hstep spin">⟳</div><div class="hinfo">Fetching source pages…</div><div class="hmeta"></div></div>` : "");

  // Price row
  const priceRow = h.skus != null
    ? `<div class="hrow done"><div class="hstep">✓</div><div class="hinfo"><b>Price intel</b></div><div class="hmeta">${h.skus} SKUs · ${(h.priceBands ?? []).map((b) => `${esc(b.label)} ₹${b.min}–${b.max} (${b.share}%)`).join(" · ")}</div></div>`
    : "";

  // Intel row
  const intelRow = iDone
    ? `<div class="hrow done"><div class="hstep">✓</div><div class="hinfo"><b>Intel pack built</b></div><div class="hmeta">confidence: ${esc(intel.confidence ?? "—")} · attribution: ${intel.attribution ?? 0}% · ${intel.segments ?? 0} segments · ${intel.competitors ?? 0} competitors${intel.degraded ? " · ⚠ degraded" : ""}</div></div>`
    : iRunning ? `<div class="hrow active"><div class="hstep spin">⟳</div><div class="hinfo"><b>Building intelligence pack…</b></div><div class="hmeta">grounding claims, building segments</div></div>` : "";

  const isEmpty = hStage === "pending" && iStage === "pending";
  const content = isEmpty
    ? `<div class="empty"><div class="big">🔍</div><p>Hit Run to start harvesting research and building the intelligence pack for your category.</p></div>`
    : `<div class="hlist">${lensRows}${pendingLenses}${sourcesRow}${priceRow}${intelRow}</div>`;

  return `<div class="card grow">${content}</div>`;
}

// ── ARENA ──
function arenaHtml(s) {
  const total = s.decided + s.abstained;
  const leader = s.tally[0];
  const max = Math.max(1, ...s.tally.map((t) => t.votes));
  // Resolve the real brand name for the leading blind label
  const leaderDecision = leader ? s.feed.find((f) => f.pickedLabel === leader.label && !f.abstained) : null;
  const leaderConceptId = leaderDecision?.pickedConceptId;
  const leaderBrand = leaderConceptId ? (s.finalists.find((f) => f.conceptId === leaderConceptId) ?? s.brands.find((b) => b.conceptId === leaderConceptId)) : null;
  const leaderName = leaderBrand?.name ?? leader?.label ?? "";
  const leadPct = leader && s.decided > 0 ? ((leader.votes / s.decided) * 100).toFixed(0) : null;
  const winnerBanner = leader && s.decided > 0 ? `<div class="winner-banner">
    <div style="display:flex;flex-direction:column;gap:3px;min-width:0">
      <span class="winner-badge">Currently leading</span>
      <span class="winner-name">${esc(leaderName)}</span>
      ${leaderName !== leader.label ? `<span style="font-size:11px;color:var(--mut)">${esc(leader.label)}</span>` : ""}
    </div>
    <div class="winner-stats">
      <div class="wstat good"><div class="val">${leadPct}%</div><div class="lbl">Share</div></div>
      <div class="wstat good"><div class="val">${leader.votes}</div><div class="lbl">Votes</div></div>
      <div class="wstat"><div class="val">${s.decided}</div><div class="lbl">Decided</div></div>
      <div class="wstat"><div class="val">${s.abstained}</div><div class="lbl">Abstained</div></div>
    </div>
  </div>` : "";
  const bars = s.tally.length ? s.tally.map((t) => `<div class="barrow">
    <div class="bh"><span>${esc(t.label)}</span><span>${t.votes} vote${t.votes !== 1 ? "s" : ""}</span></div>
    <div class="track"><div class="fill" style="width:${(t.votes / max) * 100}%"></div></div>
  </div>`).join("") : `<div style="color:var(--mut);padding:20px 0;text-align:center">Waiting for buyer agents…</div>`;
  const feed = s.feed.map((f, i) => f.abstained || f.errored
    ? `<div class="fitem ab" data-idx="${i}"><div class="ftop"><span class="pid">${esc(f.personaId)}</span><span class="seg">${esc(f.segment)}</span><span style="font-size:11px;color:var(--mut)">${f.errored ? "errored" : "abstained"}</span></div></div>`
    : `<div class="fitem" data-idx="${i}"><div class="ftop"><span class="pid">${esc(f.personaId)}</span><span class="seg">${esc(f.segment)}</span><span class="opt">→ ${esc(f.pickedLabel)}</span>${f.confidence != null ? `<span class="conv">conf ${f.confidence.toFixed(2)}</span>` : ""}</div><div class="reason">"${esc(f.reason)}"</div>${f.topObjection ? `<div class="obj">Objection: ${esc(f.topObjection)}</div>` : ""}</div>`).join("");
  return `${winnerBanner}<div class="arena">
    <div class="card">
      <div class="card-title">Vote tally (blind labels)</div>
      ${bars}
      <div class="tally-foot">${total || 0} agents responded · click a decision below to inspect conversation</div>
    </div>
    <div class="card grow">
      <div class="card-title">Live decisions — click any to open conversation</div>
      <div class="feed-scroll">${feed || '<div style="color:var(--mut);padding:30px 0;text-align:center">Decisions will stream here as agents respond…</div>'}</div>
    </div>
  </div>`;
}

// ── CREATIVE ──
function creativeHtml(s) {
  if (!s.creative.length) return `<div class="card"><div class="empty"><div class="big">🎨</div><p>Creative assets will appear once finalists are selected from the arena.</p></div></div>`;
  const rows = s.creative.map((b) => {
    const moat = s.finalists.find((f) => f.conceptId === b.conceptId)?.moatOverall;
    const cell = (lbl, url) => url ? `<img class="thumb" src="${esc(url)}" title="${lbl}" onerror="this.style.opacity=.15">` : `<div class="thumb ph"><span>${lbl}</span></div>`;
    return `<div class="brow"><div><div class="bname">${esc(b.name)}</div>${moat != null ? `<div class="bmoat">moat ${moat.toFixed(2)}</div>` : ""}</div><div class="thumb-wrap">${cell("logo", b.logo)}${cell("pack", b.packaging)}${cell("prod", b.product)}</div></div>`;
  }).join("");
  return `<div class="card">${rows}</div>`;
}

// ── PAGES ──
function pagesHtml(s) {
  if (!s.pages.length) return `<div class="card"><div class="empty"><div class="big">🚀</div><p>Your 3 branded landing pages will appear here when the run completes.</p></div></div>`;
  const cards = s.pages.map((p) => {
    const winTag = p.winRate != null ? `<span class="ptag win">Win ${pct(p.winRate)}</span>` : "";
    const moatTag = p.moatOverall != null ? `<span class="ptag">Moat ${p.moatOverall.toFixed(2)}</span>` : "";
    return `<div class="pcard"><div class="pframe"><iframe src="${esc(p.url)}" loading="lazy" sandbox="allow-scripts allow-same-origin"></iframe></div><div class="pbody"><div class="pname">${esc(p.name)}</div><div class="pmeta">${winTag}${moatTag}</div><a href="${esc(p.url)}" target="_blank">Open page ↗</a></div></div>`;
  }).join("");
  return `<div class="pages-grid">${cards}</div>`;
}

// ── MODAL ──
function openModal(f) {
  $("m-name").textContent = f.personaId;
  $("m-seg").textContent = f.segment;
  const conf = f.confidence != null ? `<div class="conf-bar"><div class="conf-fill" style="width:${(f.confidence * 100).toFixed(0)}%"></div></div>` : "";
  $("m-body").innerHTML = `
    <div class="detail-row"><div class="dk">Picked</div><div class="dv pick">${esc(f.pickedLabel)} (${esc(f.pickedConceptId)})</div></div>
    <div class="detail-row"><div class="dk">Reason</div><div class="dv">${esc(f.reason)}</div></div>
    ${f.topObjection ? `<div class="detail-row"><div class="dk">Objection</div><div class="dv obj">${esc(f.topObjection)}</div></div>` : ""}
    ${f.confidence != null ? `<div class="detail-row"><div class="dk">Confidence</div><div class="dv">${(f.confidence * 100).toFixed(0)}%${conf}</div></div>` : ""}
    ${f.willingnessToPayMinor ? `<div class="detail-row"><div class="dk">WTP</div><div class="dv">₹${(f.willingnessToPayMinor / 100).toLocaleString("en-IN")}</div></div>` : ""}
    ${f.abstained ? `<div class="detail-row"><div class="dk">Status</div><div class="dv" style="color:var(--mut)">Abstained</div></div>` : ""}
  `;
  $("modal").classList.add("open");
}
$("mclose").onclick = () => $("modal").classList.remove("open");
$("modal").onclick = (e) => { if (e.target === $("modal")) $("modal").classList.remove("open"); };

// ── TABS / COHORT / RUN ──
for (const t of document.querySelectorAll(".tab")) t.onclick = () => { state = { ...state, activeTab: t.dataset.tab }; render(state); };
$("cohort").oninput = () => { $("cohort-val").textContent = $("cohort").value; };
$("run").onclick = async () => {
  const cohortSize = Number($("cohort").value) || 80;
  const r = await fetch("/api/run", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ category: $("cat").value, cohortSize }) });
  if (r.status === 409) { $("status").textContent = "a run is already active"; }
};

// ── INIT ──
(async () => {
  try { const snap = await (await fetch("/api/state")).json(); for (const e of snap.events ?? []) state = reduce(state, e); render(state); } catch { render(state); }
  const es = new EventSource("/api/events");
  es.onmessage = (m) => { try { state = reduce(state, JSON.parse(m.data)); render(state); } catch {} };
})();
render(state);
</script>
</body></html>
